openapi: 3.0.3
info:
  title: Busan AI Travel Guide API
  version: 1.0.0
  description: |
    MVP API 명세서.

    범위
    - 여행 프로필 입력 (동행 유형, 여행 기간, 스타일, 이동 수단, 페이스, 예산)
    - 부산 지역 카드 조회
    - 장소 추천 (여행자 유형·지역·예산·태그 기반)
    - 일정 초안 조회

servers:
  - url: http://localhost:8000
    description: Local development server

tags:
  - name: Travel Profile
    description: 사용자 여행 조건 입력 및 저장
  - name: Regions
    description: 부산 지역 카드 조회
  - name: Recommendations
    description: 추천 생성 및 추천 결과 조회
  - name: Itineraries
    description: 일정 초안 조회

paths:
  /travel-profile:
    post:
      tags:
        - Travel Profile
      summary: 사용자 여행 정보 입력
      description: |
        동행 유형, 여행 기간, 스타일, 이동 수단, 페이스, 예산 등 여행 조건을 저장한다.
        생성된 profile_id는 추천 및 일정 조회에 사용된다.
      operationId: createTravelProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TravelProfileCreateRequest'
            examples:
              soloExample:
                summary: 솔로 여행자 예시
                value:
                  companion: solo
                  duration: "1 night, 2 days"
                  style:
                    - Ocean / Night View
                    - Cafe Hopping
                  transport_mode: public_transport
                  pace_level: moderate
                  budget_level: medium
      responses:
        '201':
          description: 여행 프로필 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TravelProfileCreateResponse'
        '400':
          description: 입력값 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 요청 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /regions:
    get:
      tags:
        - Regions
      summary: 부산 지역 카드 조회
      description: 부산 주요 지역 카드 목록을 조회한다.
      operationId: getRegions
      responses:
        '200':
          description: 지역 카드 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionListResponse'

  /recommend:
    post:
      tags:
        - Recommendations
      summary: 장소 추천 요청
      description: 사용자 조건(여행자 유형, 지역, 예산, 선호 태그)을 기반으로 상위 5개 장소를 추천한다.
      operationId: recommendPlaces
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendRequest'
            examples:
              soloHaeundae:
                summary: 솔로 여행자 해운대 추천 요청
                value:
                  user_type: solo
                  district: 해운대
                  budget: 중간
                  preferred_tags:
                    - 혼밥
                    - 바다뷰
      responses:
        '200':
          description: 추천 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendResponse'
        '422':
          description: 요청 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /itineraries/{profile_id}:
    get:
      tags:
        - Itineraries
      summary: 일정 초안 조회
      description: 특정 여행 프로필에 대해 생성된 일정 초안을 조회한다.
      operationId: getItineraryByProfileId
      parameters:
        - name: profile_id
          in: path
          required: true
          description: 여행 프로필 ID
          schema:
            type: integer
            example: 101
      responses:
        '200':
          description: 일정 초안 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItineraryResponse'
        '404':
          description: 일정 초안을 찾을 수 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    TravelProfileCreateRequest:
      type: object
      required:
        - companion
        - duration
        - style
      properties:
        companion:
          type: string
          description: 동행 유형
          enum:
            - solo
            - couple
            - family
            - friends
          example: solo
        duration:
          type: string
          description: 여행 기간
          enum:
            - Half day
            - One day trip
            - 1 night, 2 days
            - 2 nights, 3 days or more
          example: One day trip
        style:
          type: array
          minItems: 1
          description: 여행 스타일 (복수 선택 가능)
          items:
            type: string
            enum:
              - Ocean / Night View
              - Food Tour
              - Cafe Hopping
              - Healing / Relaxation
          example:
            - Ocean / Night View
            - Cafe Hopping
        transport_mode:
          type: string
          description: 이동 수단
          enum:
            - car
            - public_transport
            - mixed
          example: public_transport
        pace_level:
          type: string
          description: 여행 페이스
          enum:
            - relaxed
            - moderate
            - tight
          example: moderate
        budget_level:
          type: string
          description: 예산 수준
          enum:
            - low
            - medium
            - high
          example: medium

    TravelProfileCreateResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: travel profile created successfully
        data:
          type: object
          properties:
            profile_id:
              type: integer
              example: 101
            companion:
              type: string
              example: solo
            created_at:
              type: string
              format: date-time
              example: 2026-03-24T14:00:00Z

    RegionCard:
      type: object
      properties:
        region_id:
          type: integer
          example: 1
        region_name:
          type: string
          example: Haeundae
        region_description:
          type: string
          example: Beach, ocean view, walking course, and photo spots
        region_themes:
          type: array
          items:
            type: string
          example:
            - beach
            - ocean_view
            - walking
        center_latitude:
          type: number
          format: float
          example: 35.1587
        center_longitude:
          type: number
          format: float
          example: 129.1604

    RegionListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: regions retrieved successfully
        data:
          type: object
          properties:
            regions:
              type: array
              items:
                $ref: '#/components/schemas/RegionCard'

    RecommendRequest:
      type: object
      required:
        - user_type
        - district
        - budget
        - preferred_tags
      properties:
        user_type:
          type: string
          description: 여행자 유형
          enum:
            - solo
            - family
            - workation
          example: solo
        district:
          type: string
          description: 선호 지역
          example: 해운대
        budget:
          type: string
          description: 예산 수준
          enum:
            - 낮음
            - 중간
            - 높음
          example: 중간
        preferred_tags:
          type: array
          minItems: 1
          description: 선호 태그 목록
          items:
            type: string
          example:
            - 혼밥
            - 바다뷰

    RecommendResultItem:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: 해운대 바다식당
        category:
          type: string
          example: 맛집
        district:
          type: string
          example: 해운대
        score:
          type: integer
          description: 추천 점수 (태그·지역·예산 매칭 기반)
          example: 75
        summary:
          type: string
          example: 해운대 바다식당은(는) 선택한 지역과 일치, 예산 수준이 유사, 선호 태그 일치: 혼밥, 바다뷰 조건에 적합하여 추천됩니다.

    RecommendResponse:
      type: object
      properties:
        results:
          type: array
          maxItems: 5
          description: 추천 점수 상위 5개 장소
          items:
            $ref: '#/components/schemas/RecommendResultItem'

    ItineraryItem:
      type: object
      properties:
        order:
          type: integer
          example: 1
        place_id:
          type: integer
          example: 1001
        name:
          type: string
          example: Haeundae Beach
        category:
          type: string
          example: attraction
        district:
          type: string
          example: Haeundae-gu
        latitude:
          type: number
          format: float
          example: 35.1587
        longitude:
          type: number
          format: float
          example: 129.1604
        external_url:
          type: string
          format: uri
          nullable: true
          example: https://example.com/places/1001
        note:
          type: string
          example: Best visited in the morning

    ItineraryDay:
      type: object
      properties:
        day:
          type: integer
          example: 1
        summary:
          type: string
          example: Haeundae coastal walk and cafe route
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryItem'

    ItineraryData:
      type: object
      properties:
        itinerary_id:
          type: integer
          example: 501
        profile_id:
          type: integer
          example: 101
        itinerary_title:
          type: string
          example: 2 Days Busan Solo Trip
        itinerary_days:
          type: array
          items:
            $ref: '#/components/schemas/ItineraryDay'
        created_at:
          type: string
          format: date-time
          example: 2026-03-24T14:15:00Z

    ItineraryResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: itinerary retrieved successfully
        data:
          $ref: '#/components/schemas/ItineraryData'

    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: INVALID_REQUEST
        message:
          type: string
          example: invalid request

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
